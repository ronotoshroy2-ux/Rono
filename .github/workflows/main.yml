name: Android build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 1. Checkout repo
        uses: actions/checkout@v4

      - name: 2. Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: 3. Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 4. Install pnpm 10
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 5. Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 6. Generate lockfile if missing
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::warning::pnpm-lock.yaml missing — generating on runner."
            pnpm install --lockfile-only
          else
            echo "pnpm-lock.yaml found — using committed lockfile."
          fi

      - name: 7. Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 8. Build web bundle for Capacitor
        env:
          PORT: "5000"
          BASE_PATH: "./"
        run: pnpm --filter @workspace/3d-game run build

      - name: 9. Capacitor sync (Android)
        working-directory: mobile
        run: npx cap sync android

      - name: 10. Build debug APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: 11. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
