name: Android build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Belt-and-braces: if pnpm-lock.yaml didn't make it to the
      # GitHub checkout for any reason, generate one now so the
      # install step never fails on a missing lockfile.
      - name: Ensure lockfile exists
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::warning::pnpm-lock.yaml missing in checkout — generating one on the runner."
            pnpm install --lockfile-only
          else
            echo "pnpm-lock.yaml found in checkout."
          fi

      - name: Install workspace dependencies
        run: pnpm install

      - name: Build web bundle
        env:
          PORT: "5000"
          BASE_PATH: "./"
        run: pnpm --filter @workspace/3d-game run build

      - name: Capacitor sync (Android only)
        working-directory: mobile
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
