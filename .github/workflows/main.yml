name: Android build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK + AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install workspace dependencies
        run: pnpm install

      - name: Build web bundle
        env:
          PORT: "5000"
          BASE_PATH: "./"
        run: pnpm --filter @workspace/3d-game run build

      - name: Capacitor sync (Android only)
        working-directory: mobile
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Check release signing secrets
        id: signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] \
            && [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] \
            && [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ] \
            && [ -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Release signing secrets missing — skipping signed AAB."
          fi

      - name: Decode keystore
        if: steps.signing.outputs.available == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Bundle signed release AAB
        if: steps.signing.outputs.available == 'true'
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload signed release AAB
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
